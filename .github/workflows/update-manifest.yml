name: Update Manifest

on:
  repository_dispatch:
    types: [update-manifest]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update manifest
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          WINDOWS_SHA="${{ github.event.client_payload.windows_sha256 }}"

          cat > bucket/pomitik.json << JSON
          {
              "version": "${VERSION}",
              "description": "A command-line countdown timer with Pomodoro sessions",
              "homepage": "https://github.com/jakubawieruk/pomitik",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/jakubawieruk/pomitik/releases/download/v${VERSION}/pomitik-x86_64-pc-windows-msvc.zip",
                      "hash": "${WINDOWS_SHA}"
                  }
              },
              "bin": "tik.exe",
              "checkver": "github",
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/jakubawieruk/pomitik/releases/download/v\$version/pomitik-x86_64-pc-windows-msvc.zip"
                      }
                  }
              }
          }
          JSON

          sed -i 's/^          //' bucket/pomitik.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/pomitik.json
          git commit -m "Update pomitik to ${{ github.event.client_payload.version }}"
          git push
